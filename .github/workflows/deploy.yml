name: Deploy to GitHub Pages

on:
  push:
    branches: [master]   # runs on every push to master
  workflow_dispatch:      # allows manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # config.js is gitignored so it never lives in the repo.
      # We create it here at build time from the GitHub Secret.
      # Using env: keeps the secret out of the shell command log.
      - name: Inject API keys into config.js
        env:
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
        run: |
          printf 'window.SITE_CONFIG = {\n  web3formsKey: "%s"\n};\n' "$WEB3FORMS_KEY" > assets/js/config.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
