name: Deploy to GitHub Pages

on:
  push:
    branches: [master]   # runs every time you push to master
  workflow_dispatch:      # lets you trigger it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Create config.js at build time using the GitHub Secret.
      # The file is gitignored, so it never lives in the repo.
      - name: Inject API keys into config.js
        run: |
          cat > assets/js/config.js <<EOF
          window.SITE_CONFIG = {
            web3formsKey: '${{ secrets.WEB3FORMS_KEY }}'
          };
          EOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # uploads the entire repo root as the site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
